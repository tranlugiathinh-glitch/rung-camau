<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Danh sách thành viên</title>

<style>
body{
    font-family:Arial;
    background:#0f1f14;
    color:white;
    text-align:center;
    padding:50px;
}

h1{
    color:#00ff88;
    margin-bottom:40px;
}

.member-list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    max-width:800px;
    margin:auto;
}

.member{
    background:#1c3a28;
    padding:20px;
    border-radius:15px;
    transition:0.3s;
}

.member:hover{
    transform:scale(1.05);
    background:#00ff88;
    color:black;
}

.member a{
    text-decoration:none;
    color:inherit;
    font-weight:bold;
}
</style>
</head>
