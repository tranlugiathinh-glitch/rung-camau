<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Danh sách thành viên</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(5px);
    z-index:1000;
}

.logo{
    color:white;
    font-weight:bold;
    font-size:20px;
}

.navbar nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-weight:500;
    transition:0.3s;
}

.navbar nav a:hover{
    color:#00ff88;
}

/* BODY */
body{
    background:#0f1f14;
    color:white;
    padding-top:100px; /* chừa chỗ cho navbar */
}

/* MAIN CONTENT */
.main{
    text-align:center;
    padding:40px 20px;
}

h1{
    color:#00ff88;
    margin-bottom:40px;
}

.member-list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    max-width:1000px;
    margin:auto;
}

.member{
    background:#1c3a28;
    padding:25px;
    border-radius:15px;
    transition:0.3s;
}

.member:hover{
    transform:scale(1.05);
    background:#00ff88;
    color:black;
}

.member a{
    text-decoration:none;
    color:inherit;
    font-weight:bold;
}
</style>
</head>

<body>

<header class="navbar">
    <div class="logo">RỪNG CÀ MAU</div>
    <nav>
        <a href="index.html">Trang Chủ</a>
        <a href="rung.html">5 khu rừng</a>
        <a href="thanhvien.html">Thành Viên</a>
    </nav>
</header>

<div class="main">

<h1>👥 Thành viên nhóm</h1>

<div class="member-list">

<div class="member"><a href="tv1.html">Thành viên 1</a></div>
<div class="member"><a href="tv2.html">Thành viên 2</a></div>
<div class="member"><a href="tv3.html">Thành viên 3</a></div>
<div class="member"><a href="tv4.html">Thành viên 4</a></div>
<div class="member"><a href="tv5.html">Thành viên 5</a></div>
<div class="member"><a href="tv6.html">Thành viên 6</a></div>

</div>

</div>

</body>
</html>
