<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rừng đước Năm Căn</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0f1f14;color:white;}
.hero{background:url("anh-rung-ca-mau.png") no-repeat center center/cover;height:60vh;display:flex;justify-content:center;align-items:center;text-align:center;position:relative;}
.hero::after{content:"";position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.6);}
.hero-content{position:relative;z-index:2;}
.hero h1{font-size:45px;color:#00ff88;}
.section{padding:60px 20px;}
.container{max-width:1100px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:50px;}
.info h2{color:#00ff88;margin-bottom:20px;}
.info p{margin-bottom:15px;line-height:1.6;}
.map-container img{width:100%;border-radius:15px;}
.back{text-align:center;margin-top:50px;}
.back a{text-decoration:none;padding:12px 25px;border-radius:30px;background:#00ff88;color:black;font-weight:bold;}
@media(max-width:900px){.container{grid-template-columns:1fr;}}
</style>
</head>

<body>

<div class="hero">
<div class="hero-content">
<h1>🌳 Rừng đước Năm Căn</h1>
</div>
</div>

<div class="section">
<div class="container">

<div class="info">
<h2>Thông tin tổng quan</h2>
<p><b>Vị trí:</b> Huyện Năm Căn, Cà Mau.</p>
<p><b>Diện tích:</b> Hàng nghìn ha rừng đước ven biển.</p>
<p><b>Đặc điểm:</b> Rừng đước phát triển mạnh ven sông.</p>
<p><b>Vai trò:</b> Bảo vệ bờ biển và chống xói lở.</p>
</div>

<div class="map-container">
<img src="anh-rung-ca-mau.png">
</div>

</div>

<div class="back">
<a href="rung.html">⬅ Quay lại</a>
</div>

</div>
</body>
</html>
