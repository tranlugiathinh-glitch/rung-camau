<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tâm sự đôi dòng</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f1f14;
    color:white;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#1c3a28;
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,255,136,0.3);
}

h1{
    text-align:center;
    color:#00ff88;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input[type="text"],
input[type="date"]{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    outline:none;
}

.radio-group,
.checkbox-group{
    margin-top:5px;
}

.radio-group label,
.checkbox-group label{
    display:block;
    margin-bottom:5px;
    font-weight:normal;
}

textarea{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
}

.back-btn{
    display:inline-block;
    margin-top:20px;
    padding:10px 20px;
    background:#00ff88;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}
.back-btn:hover{
    opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<h1>TÂM SỰ ĐÔI DÒNG VỀ BẢN THÂN</h1>

<form>

<div class="form-group">
<label>Họ tên thành viên:</label>
<input type="text">
</div>

<div class="form-group">
<label>Ngày sinh:</label>
<input type="date">
</div>

<div class="form-group">
<label>Giới tính:</label>
<div class="radio-group">
<label><input type="radio" name="gender"> Nam</label>
<label><input type="radio" name="gender"> Nữ</label>
</div>
</div>

<div class="form-group">
<label>Màu sắc yêu thích:</label>
<input type="text">
</div>

<div class="form-group">
<label>Môn thể thao yêu thích:</label>
<div class="checkbox-group">
<label><input type="checkbox"> Bóng đá</label>
<label><input type="checkbox"> Cầu lông</label>
<label><input type="checkbox"> Bóng chuyền</label>
<label><input type="checkbox"> Ca hát</label>
<label><input type="checkbox"> Nhảy - Múa</label>
<label><input type="checkbox"> Khác</label>
</div>
</div>

<div class="form-group">
<label>Môn học tự tin:</label>
<input type="text">
</div>

<div class="form-group">
<label>Phương châm sống:</label>
<textarea rows="3"></textarea>
</div>

</form>

<a href="thanhvien.html" class="back-btn">← Quay lại</a>

</div>

</body>
</html>
