<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vườn quốc gia U Minh Hạ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f1f14;
    color:white;
}

.hero{
    background:url("anh-rung-ca-mau.png") no-repeat center center/cover;
    height:60vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.hero-content{
    position:relative;
    z-index:2;
}

.hero h1{
    font-size:45px;
    color:#00ff88;
}

.section{
    padding:60px 20px;
}

.container{
    max-width:1100px;
    margin:auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:50px;
}

.info h2{
    color:#00ff88;
    margin-bottom:20px;
}

.info p{
    margin-bottom:15px;
    line-height:1.6;
}

.map-container{
    position:relative;
}

.map-container img{
    width:100%;
    border-radius:15px;
}

/* Chấm đỏ radar */
.marker{
    position:absolute;
    top:35%;
    left:30%;
    width:18px;
    height:18px;
    background:red;
    border-radius:50%;
    transform:translate(-50%,-50%);
}

.marker::before{
    content:"";
    position:absolute;
    width:40px;
    height:40px;
    border:3px solid red;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:translate(-50%,-50%) scale(0.5); opacity:1;}
    100%{transform:translate(-50%,-50%) scale(1.5); opacity:0;}
}

.back{
    text-align:center;
    margin-top:50px;
}

.back a{
    text-decoration:none;
    padding:12px 25px;
    border-radius:30px;
    background:#00ff88;
    color:black;
    font-weight:bold;
}

@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="hero">
    <div class="hero-content">
        <h1>🌳 Vườn quốc gia U Minh Hạ</h1>
    </div>
</div>

<div class="section">
<div class="container">

<div class="info">
    <h2>Thông tin tổng quan</h2>
    <p><b>Vị trí:</b> Huyện U Minh và Trần Văn Thời, Cà Mau.</p>
    <p><b>Diện tích:</b> Khoảng 8.527 ha.</p>
    <p><b>Đặc điểm:</b> Rừng tràm trên đất than bùn.</p>
    <p><b>Đa dạng sinh học:</b> Nhiều loài chim, thú và thực vật quý.</p>
    <p><b>Vai trò:</b> Bảo tồn và phát triển du lịch sinh thái.</p>
</div>

<div class="map-container">
    <img src="anh-rung-ca-mau.png" alt="Bản đồ minh họa">
    <div class="marker"></div>
</div>

</div>

<div class="back">
    <a href="rung.html">⬅ Quay lại </a>
</div>

</div>

</body>
</html>
